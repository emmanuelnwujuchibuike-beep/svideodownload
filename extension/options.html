<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SVideoDownload — Settings</title>
    <style>
      body { font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif; max-width: 440px; margin: 40px auto; padding: 0 16px; color: #111; }
      h1 { font-size: 20px; }
      label { display: block; font-size: 13px; font-weight: 600; margin: 18px 0 6px; }
      input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; }
      .hint { font-size: 12px; color: #666; margin-top: 6px; }
      button { margin-top: 20px; padding: 10px 16px; border: 0; border-radius: 8px; background: #2563eb; color: #fff; font-weight: 600; cursor: pointer; }
      .ok { color: #16a34a; font-size: 13px; margin-left: 10px; }
    </style>
  </head>
  <body>
    <h1>SVideoDownload settings</h1>

    <label for="apiKey">API key (optional)</label>
    <input id="apiKey" placeholder="svd_live_…" />
    <p class="hint">Paste your API key (from your account) to sync your Pro/Business plan and remove ads. Leave blank to use it for free.</p>

    <label for="apiBase">API base URL</label>
    <input id="apiBase" placeholder="https://svideodownload.com" />
    <p class="hint">Only change this if you self-host.</p>

    <div>
      <button id="save">Save</button>
      <span id="status" class="ok"></span>
    </div>

    <script src="options.js"></script>
  </body>
</html>
